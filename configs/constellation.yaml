constellation:
  name: "Starlink-Shell-1"
  altitude_km: 550.0
  inclination_deg: 53.0
  num_planes: 72
  total_satellites: 1584
  phasing: 1
  eirp_dbw: 50.0
  g_t_db: -25.12 # corrected: G=35dBi, T=150K → G/T=13.2 dB/K
  min_elevation_deg: 25.0
  apply_j2: true

  # Hardware Constraints
  max_spot_beams: 32
  beam_radius_nadir_km: 120.0
  max_steering_angle_deg: 45.0

  # ==========================================
  # NEW: 3GPP Antenna and RF Parameters
  # ==========================================
  freq_ghz: 2.2                     # S-band frequency (2.2 GHz) for NTN ku-band 10-12 GHz
  bandwidth_hz: 300000000           # 40 MHz satellite channel
  sinr_min_db: 0.0              # NTN minimum SINR (Starlink can go down to -10 dB or -5.00, but we'll be conservative)
  theta_3db_deg: 7.5            # Half-power beamwidth
  sll_db: 25.0                  # Side-Lobe Level (isolation)
  weather_loss_db: 1.0      # was missing — defaults to 1.0 in code